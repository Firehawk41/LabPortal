<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRECILAB Testing Request Form</title>

  <!-- Select2 4.0.13 (stable — not RC) -->
  <!-- TODO: add integrity="sha384-..." crossorigin="anonymous" after verifying at https://www.srihash.org/ -->
  <link href="https://cdn.jsdelivr.net/npm/select2@4.0.13/dist/css/select2.min.css" rel="stylesheet" />

  <!-- Tagify 4.31.3 (pinned) -->
  <link href="https://cdn.jsdelivr.net/npm/@yaireo/tagify@4.31.3/dist/tagify.css" rel="stylesheet" />

  <!-- jQuery 3.7.1 -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- Select2 4.0.13 JS -->
  <script src="https://cdn.jsdelivr.net/npm/select2@4.0.13/dist/js/select2.min.js"></script>

  <!-- Tagify 4.31.3 JS -->
  <script src="https://cdn.jsdelivr.net/npm/@yaireo/tagify@4.31.3/dist/tagify.min.js"></script>

  <!-- App JS (defer ensures it runs after DOM + CDN scripts are ready) -->
  <script src="{{ url_for('static', filename='js/script.js') }}" defer></script>

</head>
<body>
  <h1>Testing Request Form</h1>

  <form id="sampleForm">
    <fieldset>
      <legend>Customer Information</legend>

      <div class="form-row">
        <label for="customer-name">Company:</label>
        <input name="customer-name" id="customer-name" placeholder="Company" required>
      </div>
      <div class="form-row">
        <label for="street-address">Street Address:</label>
        <input name="street-address" id="street-address" required>
      </div>
      <div class="form-row">
        <label for="city">City:</label>
        <input name="city" id="city" required>
      </div>
      <div class="form-row">
        <label for="state">State:</label>
        <input name="state" id="state" required>
      </div>
      <div class="form-row">
        <label for="country">Country:</label>
        <input name="country" id="country" placeholder="USA" required>
      </div>

      <div class="form-row">
        <label for="customer-contact">Test requested by:</label>
        <input name="customer-contact" id="customer-contact" required>
      </div>
      <div class="form-row">
        <label for="customer-phone">Phone #:</label>
        <input name="customer-phone" id="customer-phone" required>
      </div>

      <div class="form-row">
        <label for="results-list">Results Distribution List / Main:</label>
        <input name="results-list" id="results-list" class="email-tag-input" required>
      </div>
      <div class="form-row">
        <label for="results-cc-list">Results Distribution List / CC:</label>
        <input name="results-cc-list" id="results-cc-list" class="email-tag-input">
      </div>

      <div class="form-row">
        <label>Payment Method:</label><br>
        <input type="radio" id="pay-po" name="payment_method" value="po" checked>
        <label for="pay-po">Purchase Order</label>

        <input type="radio" id="pay-cc" name="payment_method" value="cc">
        <label for="pay-cc">Credit Card</label>
      </div>

      <!-- PO Number input -->
      <div class="form-row" id="po-info">
        <label for="po-number">PO Number:</label>
        <input name="po-number" id="po-number" placeholder="Enter PO number">
      </div>

      <!-- CC info input -->
      <div class="form-row" id="cc-info" style="display: none;">
        <label for="cc-number">Credit Card (Last 4 digits &amp; name):</label>
        <input name="cc-number" id="cc-number" placeholder="1234 John Doe">
      </div>

      <div class="form-row">
        <label for="invoice-list">Invoice Distribution List / Main:</label>
        <input name="invoice-list" id="invoice-list" class="email-tag-input" required>
      </div>
      <div class="form-row">
        <label for="invoice-cc-list">Invoice Distribution List / CC:</label>
        <input name="invoice-cc-list" id="invoice-cc-list" class="email-tag-input">
      </div>
    </fieldset>

    <h2>Sample Details</h2>
    <div id="samples">
      <!-- Rows populated by script.js -->
    </div>

    <button type="button" onclick="addSample()">+ Add Sample</button><br>

    <div id="form-error" role="alert" style="display:none; color:red; margin:1em 0;"></div>
    <button type="submit" id="submitBtn">Submit</button>
  </form>

  <!-- Modal Confirmation (hidden by default) -->
  <div id="confirmationModal"
       role="dialog"
       aria-modal="true"
       aria-labelledby="modalTitle"
       style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.5); z-index:1000;">
    <div style="background:#fff; margin:10vh auto; padding:2em; width:400px; border-radius:8px;">
      <h2 id="modalTitle">Review Your Submission</h2>
      <pre id="jsonSummary" style="max-height:300px; overflow:auto; background:#eee; padding:1em;"></pre>
      <button id="confirmBtn" type="button">Confirm &amp; Submit</button>
      <button id="cancelBtn" type="button">Cancel</button>
    </div>
  </div>

</body>
</html>
