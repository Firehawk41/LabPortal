version: "3.9"

services:
  web:
    build: .
    ports:
      - "5000:10000"
    environment:
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-dev-secret-key-change-me}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/flasktestingrequest
      FLASK_ENV: ${FLASK_ENV:-development}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flasktestingrequest
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
